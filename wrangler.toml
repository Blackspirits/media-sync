name               = "media-sync"
main               = "worker/worker.js"
compatibility_date = "2026-04-15"

# Deploy em *.workers.dev. Muda para false se usares apenas routes numa zona.
workers_dev = true

# ── Variáveis de ambiente ─────────────────────────────────────────────────────
# Substitui em .dev.vars localmente (nunca commitar .dev.vars — contém segredos).
#
# ALLOWED_ORIGIN: restringe a origem permitida. Como cada utilizador faz o seu
# próprio deploy, podes usar "*" se preferires simplificar — o x-api-key já
# protege os dados. Para maior rigor, usa o domínio do teu serviço principal.
#
# ALLOWED_PREFIXES não está definido aqui: o worker já carrega a lista completa
# por defeito. Adiciona prefixos diretamente em worker/worker.js
# (constante DEFAULT_PREFIXES) para manter uma única fonte de verdade.
[vars]
ALLOWED_ORIGIN = "*"
# ALLOWED_ORIGIN = "https://www.filmin.pt"  # exemplo mais restritivo
# MAX_BODY  = "10485760"   # 10 MB — descomenta para substituir o valor predefinido
# MAX_ITEMS = "100000"     # descomenta para substituir o valor predefinido

# ── KV namespace ─────────────────────────────────────────────────────────────
# Produção:  npx wrangler kv namespace create MEDIA
# Preview:   npx wrangler kv namespace create MEDIA --preview
# Substitui ambos os placeholders abaixo pelos ids devolvidos pelos comandos acima.
# Sem preview_id, o `wrangler dev` bate no KV de produção — não saltar este passo.
[[kv_namespaces]]
binding    = "MEDIA"
id         = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_NAMESPACE_ID"

# ── Segredos (nunca colocar valores aqui — usar o dashboard ou wrangler secret) ─
# Obrigatório:  npx wrangler secret put API_KEY
# Opcional:     npx wrangler secret put READ_KEY   (chave de leitura separada)
